<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="flameGrad" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="40%" stop-color="#f472b6"/>
      <stop offset="70%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect width="32" height="32" rx="6" fill="#0a0a0f"/>
  <!-- 主火焰 -->
  <path d="M16 3
           C12 8, 8 12, 8 16
           C8 22, 11 26, 16 26
           C21 26, 24 22, 24 16
           C24 12, 20 8, 16 3Z" 
        fill="url(#flameGrad)" opacity="0.95"/>
  <!-- 内火焰（更亮的芯） -->
  <path d="M16 8
           C14 11, 12 13, 12 15
           C12 19, 14 22, 16 22
           C18 22, 20 19, 20 15
           C20 13, 18 11, 16 8Z" 
        fill="url(#innerGrad)" opacity="0.7"/>
  <!-- 火焰顶部尖角 -->
  <path d="M16 3 C15 5, 14 6, 13 6 C14 5, 15 4, 16 3Z" fill="#7c3aed" opacity="0.8"/>
  <path d="M16 3 C17 5, 18 6, 19 6 C18 5, 17 4, 16 3Z" fill="#a78bfa" opacity="0.6"/>
  <!-- 底部光点 -->
  <ellipse cx="16" cy="24" rx="3" ry="1.5" fill="#fbbf24" opacity="0.3"/>
</svg>